services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_db:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    container_name: rag-assistant
    ports:
      - "7860:7860"
    volumes:
      - ./project:/app/project
      - ./scripts:/app/scripts
      - ./parent_store:/app/parent_store
      - ./markdown_docs:/app/markdown_docs
    env_file:
      - project/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    restart: unless-stopped
